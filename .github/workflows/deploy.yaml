name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    name: Linting & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Backend Unit Tests
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Run Pytest
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django
          pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"

  build-and-secure:
    name: Build, Scan & Push Backend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify backend folder exists
        run: ls -R 

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest .

      - name: Trivy Security Scan (Backend)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          scan-type: 'image'   # only scan vulnerabilities, skip secret scanning
          vuln-type: 'os,library'

      - name: Push Backend Image
        if: success()
        run: docker push ${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest

  deploy:
    name: AWS Infrastructure & K8s Deployment
    needs: build-and-secure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Install Terraform (explicit, stable)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Install kubectl (explicit version control)
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # ✅ AWS Auth via OIDC (good practice already)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861556843110:role/github-actions-oidc-role
          aws-region: us-east-1

      # ✅ Terraform with safety
      - name: Terraform Init & Apply
        working-directory: terraform
        run: |
          terraform init
          terraform validate
          terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # ✅ Connect to EKS
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name innovet-tech-cluster

      # ✅ Create Docker secret BEFORE deployment
      - name: Create Docker Hub Secret in K8s
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ✅ Deploy manifests
      - name: Deploy Backend to EKS
        run: |
          kubectl apply -f k8s/services.yml
          kubectl apply -f k8s/ingress.yml
          kubectl apply -f k8s/backend-deploy.yml

      # ✅ Ensure new image is pulled
      - name: Force rollout restart
        run: kubectl rollout restart deployment/django-backend

      # ✅ 🚨 CRITICAL: Wait for deployment success
      - name: Verify Deployment Rollout
        run: |
          kubectl rollout status deployment/django-backend --timeout=120s