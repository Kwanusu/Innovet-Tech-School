---

### 2. Update your Deployment Manifests

Now, you must tell your **Deployments** to use this secret. Update both `k8s/backend-deploy.yml` and `k8s/frontend-deploy.yml` to include the `imagePullSecrets` field.

```yaml
spec:
  template:
    spec:
      # This line tells K8s to use the secret we created above
      imagePullSecrets:
        - name: regcred
      containers:
        - name: django-container
          image: your-docker-hub-user/innovet-backend:latest
          # ... rest of your config

```

---

### 3. The Full DevSecOps "Big Picture"

Now that every piece of the puzzle is in place, here is the flow of your professional stack:

1. **Code Push:** You push code to `main`.
2. **QA Gate:** GitHub Actions runs `flake8` and `pytest`.
3. **Security Gate:** Docker images are built and scanned by **Trivy**.
4. **Infrastructure Gate:** **Terraform** ensures the AWS VPC, EKS, and RDS are in the correct state.
5. **Orchestration:** **Kubernetes** pulls the secure images using `regcred` and routes traffic through the **ALB Ingress**.
6. **Observability:** **Loki** and **Grafana** (deployed via Helm in Terraform) begin scraping logs from the new pods.

---

### 4. A Note on "Clean Architecture"

Since you are the **Lead Architect**, you might eventually want to move from Docker Hub to **AWS ECR (Elastic Container Registry)**. This would allow you to use IAM roles instead of managing manual Docker Hub tokens, further tightening the "Sec" in your DevSecOps.

### Final Verification

To check if your deployment was successful, you can run:

* `kubectl get pods -n default` (Should show `Running`)
* `kubectl get ingress` (Should give you the Address of the Load Balancer)
* `kubectl logs -l app=django` (Should show your Django startup logs)

