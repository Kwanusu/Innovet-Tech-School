name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    name: Linting & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Backend Unit Tests
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Run Pytest
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django
          pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"

  build-and-secure:
    name: Build, Scan & Push Backend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify backend folder exists
        run: ls -R ./backend

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest ./backend

      - name: Trivy Security Scan (Backend)
        uses: aquasecurity/trivy-action@v0.11.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image
        if: success()
        run: docker push ${{ secrets.DOCKER_USERNAME }}/innovet-backend:latest

  deploy:
    name: AWS Infrastructure & K8s Deployment
    needs: build-and-secure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861556843110:role/github-actions-oidc-role
          aws-region: us-east-1

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name innovet-tech-cluster

      - name: Deploy Backend to EKS
        run: |
          kubectl apply -f k8s/services.yml
          kubectl apply -f k8s/ingress.yml
          kubectl apply -f k8s/backend-deploy.yml
          kubectl rollout restart deployment/django-backend

      - name: Create Docker Hub Secret in K8s
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -