name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    name: Linting & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Backend Unit Tests
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Pytest
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-django
          cd backend && pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"

  build-and-secure:
    name: Build, Scan & Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build images locally first to scan them
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/innovet-backend:latest ./backend

      - name: Trivy Security Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/innovet-backend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Images
        if: success()
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/innovet-backend:latest
          # Repeat build/scan/push for frontend similarly

  deploy:
    name: AWS Infrastructure & K8s
    needs: build-and-secure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name innovet-tech-cluster

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/services.yml
          kubectl apply -f k8s/ingress.yml
          kubectl apply -f k8s/backend-deploy.yml
          kubectl rollout restart deployment/django-backend


      - name: Create Docker Hub Secret
        run: |
            kubectl create secret docker-registry regcred \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_HUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_HUB_TOKEN }} \
            --docker-email=${{ secrets.DOCKER_HUB_EMAIL }} \
            --dry-run=client -o yaml | kubectl apply -f -    


          To allow your private AWS EKS cluster to pull images from your private Docker Hub repository, you need to create a **Secret** inside Kubernetes. Without this, your pods will fail with an `ImagePullBackOff` error.

---

### 1. Create the Image Pull Secret

You can add this step to your GitHub Actions `deploy` job, right after the `Update Kubeconfig` step. This ensures the cluster always has the latest credentials to talk to Docker Hub.

