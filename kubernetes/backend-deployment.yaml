apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovet-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovet-backend
  template:
    metadata:
      labels:
        app: innovet-backend
    spec:
      containers:
      - name: django
        image: innovet/backend:latest
        ports:
        - containerPort: 8000