apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovet-frontend
  labels:
    app: innovet-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: innovet-frontend
  template:
    metadata:
      labels:
        app: innovet-frontend
    spec:
      # Auth for your private Docker Hub repo
      imagePullSecrets:
        - name: regcred
      containers:
      - name: react-app
        image: ${{ secrets.DOCKER_HUB_USERNAME }}/innovet-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        
        # Health Checks (Nginx serving index.html)
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          
        # Resource management for t3.medium nodes
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"