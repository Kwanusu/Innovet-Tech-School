apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovet-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovet-frontend
  template:
    metadata:
      labels:
        app: innovet-frontend
    spec:
      containers:
      - name: react
        image: innovet/frontend:latest
        ports:
        - containerPort: 80